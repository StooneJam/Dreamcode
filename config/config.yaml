# 仅放运行时参数

# 当前分析任务（输入层）
task:
  primary_competitor: 飞书                # 用户主要分析的产品（必填）
  competitors: []                         # 可选 seed；为空则由 PM 自动扩展
  n_competitors: 5                        # PM 扩展时输出的竞品总数（默认 5）
  user_query: "对比办公协同软件，输出 SWOT 与功能对比"

# 模型路由（具体 model id 来自 .env）
llm:
  pm: gpt-5                            # supervisor，做 QA + 任务管理
  collector_text: deepseek
  collector_multimodal: gpt-5             # 遇到 PDF/图像走这条
  insight: deepseek
  analyst: deepseek
  report: gpt-5                           # 最终报告 + 多模态
  final_qa: doubao                        # 跨第三家族审 GPT-5 产出

# 流程控制
flow:
  max_retry_per_qa: 2                     # >2 即 forced，写入 unreviewed
  max_collection_pages: 30
  request_timeout_sec: 30
  use_questionnaire_skill: false          # v2 才开
  parallel_collect_insight: true          # fan-out 并行

# 输出
output:
  formats: [markdown, pdf]
  pdf_engine: weasyprint
  report_dir: reports
  include_source_urls: true
  include_unreviewed_section: true        # 自动列出 retry>2 的条目

# 问卷配置
questionnaire:
  fill_mode: llm          # llm = LLM 自动模拟填写；real = 真实分发（仅生成展示文本）
  n_llm_responses: 5      # llm 模式下模拟回答份数

# NLP 配置
nlp:
  bert_model: lxyuan/distilbert-base-multilingual-cased-sentiments-student
  fine_tune:
    enabled: true                        # true = 若 model_output_dir 存在则使用微调模型；微调本身需手动运行 scripts/finetune_bert.py
    domain: office_software
    domain_apps:
      - 钉钉
      - 企业微信
      - 飞书
      - 腾讯会议
      - WPS Office
    country: cn
    min_samples: 200                      # 少于此数时报 warning 但仍继续
    epochs: 3
    batch_size: 16
    model_output_dir: data/models/bert_fine_tuned

# 路径
paths:
  store_db: data/memory/store.db          # react_cache + 问卷缓存共用的 SQLite

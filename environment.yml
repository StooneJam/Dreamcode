name: multi-agent
channels:
  - conda-forge
  - defaults
# 仅声明 conda 负责的系统级/非 pip 依赖；Python 包依赖统一在 pyproject.toml。
dependencies:
  - python=3.11           # 3.11 稳定且 LangGraph/Streamlit 完全兼容
  - pip
  - nodejs>=18            # App Store 爬取脚本（scripts/node/）依赖
  - sqlite                # langgraph-checkpoint-sqlite 依赖

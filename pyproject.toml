[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".claude", "checkpoints", "data", "logs", "reports", "docs"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "W",   # pycodestyle warnings
    "B",   # bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (formatter 处理)
    "B008",  # function call in default arg (FastAPI/typer 常用)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
pythonpath = ["src"]
addopts = "-v --tb=short --strict-markers"
asyncio_mode = "auto"
markers = [
    "slow: 跑得慢的测试（联调/真API），默认 CI 跳过",
    "integration: 端到端集成测试",
]
